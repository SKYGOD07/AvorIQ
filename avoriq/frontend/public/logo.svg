<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="logoGradient" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#2563EB"/>
      <stop offset="50%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#10B981"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeIn in="blur"/>
        <feMergeIn in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Outer ring with gradient -->
  <circle cx="32" cy="32" r="30" stroke="url(#logoGradient)" stroke-width="2.5" filter="url(#glow)"/>
  
  <!-- Inner accent ring -->
  <circle cx="32" cy="32" r="26" stroke="#7C3AED" stroke-width="1.5" stroke-dasharray="8 8" opacity="0.5"/>
  
  <!-- Brain/neural network symbol -->
  <g stroke="url(#logoGradient)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)">
    <!-- Left hemisphere -->
    <path d="M20 32 Q16 28 18 24 Q20 20 24 20 Q28 20 30 24 Q32 28 28 32"/>
    <path d="M20 32 Q16 36 18 40 Q20 44 24 44 Q28 44 30 40 Q32 36 28 32"/>
    
    <!-- Right hemisphere -->
    <path d="M44 32 Q48 28 46 24 Q44 20 40 20 Q36 20 34 24 Q32 28 36 32"/>
    <path d="M44 32 Q48 36 46 40 Q44 44 40 44 Q36 44 34 40 Q32 36 36 32"/>
    
    <!-- Center connections -->
    <path d="M28 28 L36 36 M28 36 L36 28" stroke-width="1.5" opacity="0.8"/>
    <circle cx="32" cy="32" r="3" fill="url(#logoGradient)"/>
  </g>
  
  <!-- IQ dots -->
  <g fill="url(#logoGradient)">
    <circle cx="16" cy="16" r="2.5"/>
    <circle cx="48" cy="48" r="2.5"/>
    <circle cx="48" cy="16" r="2" opacity="0.7"/>
    <circle cx="16" cy="48" r="2" opacity="0.7"/>
  </g>
</svg>